<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasa Mining Minecraft - Ojan</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
text-align:center;

background-image:url("minecraft-bg.jpg");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:black;
}

.overlay{
background:rgba(0,0,0,0.25);
min-height:100vh;
padding:20px;
}

h1{
margin-top:10px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
max-width:500px;
margin:auto;
margin-top:20px;
}

.card{
background:rgba(30,30,30,0.85);
padding:18px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.selected{
border:3px solid #00ff88;
transform:scale(1.1);
}

.price{
color:#00ff88;
font-weight:bold;
}

.payments{
margin-top:25px;
}

.payment-btn{
background:#333;
border:none;
color:white;
padding:10px 16px;
margin:5px;
border-radius:8px;
cursor:pointer;
}

.payment-selected{
background:#00ff88;
color:black;
font-weight:bold;
}

.order-btn{
margin-top:25px;
background:#25D366;
border:none;
padding:14px 28px;
font-size:17px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="overlay">

<h1>⛏️ Jasa Cari Barang Minecraft</h1>
<p>Malas mining? Biar Ojan yang cariin!</p>

<div class="container">

<div class="card" onclick="selectItem(this,'Kayu 1 Stack')">
<h3>🌳 Kayu</h3>
<p class="price">Rp2.000 / stack</p>
</div>

<div class="card" onclick="selectItem(this,'Ore Biasa')">
<h3>🪨 Ore Biasa</h3>
<p>Coal / Iron / Copper</p>
<p class="price">Mulai Rp2.000</p>
</div>

<div class="card" onclick="selectItem(this,'Ore Langka')">
<h3>💎 Ore Langka</h3>
<p>Diamond / Gold</p>
</div>

<div class="card" onclick="selectItem(this,'Ancient Debris')">
<h3>🔥 Nether</h3>
<p>Ancient Debris</p>
</div>

</div>

<div class="payments">

<h2>Pilih Metode Pembayaran</h2>

<button class="payment-btn" onclick="selectPay(this,'GoPay')">GoPay</button>
<button class="payment-btn" onclick="selectPay(this,'OVO')">OVO</button>
<button class="payment-btn" onclick="selectPay(this,'DANA')">DANA</button>
<button class="payment-btn" onclick="selectPay(this,'QRIS')">QRIS</button>

</div>

<button class="order-btn" onclick="sendOrder()">Order via WhatsApp</button>

</div>

<script>

let selectedItem="";
let selectedPayment="";

function selectItem(card,item){

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("selected");
});

card.classList.add("selected");

selectedItem=item;

}

function selectPay(btn,pay){

document.querySelectorAll(".payment-btn").forEach(b=>{
b.classList.remove("payment-selected");
});

btn.classList.add("payment-selected");

selectedPayment=pay;

}

function sendOrder(){

if(selectedItem=="" || selectedPayment==""){
alert("Pilih item dan metode pembayaran dulu!");
return;
}

let text="Min saya mau beli: "+selectedItem+
"%0ASaya pakai metode pembayaran: "+selectedPayment;

let url="https://wa.me/628984830064?text="+text;

window.open(url);

}

</script>

</body>
</html>
