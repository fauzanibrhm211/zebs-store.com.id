<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jasa Mining Minecraft</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

background-image:url("minecraft-bg.jpg");
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,0.15); /* lebih terang */
min-height:100vh;
padding:20px;
}

h1{
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
max-width:500px;
margin:auto;
margin-top:20px;
}

.card{
background:rgba(0,0,0,0.65);
padding:16px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card img{
width:30px;
vertical-align:middle;
margin-right:6px;

/* 🔥 ANIMASI GOYANG */
animation:goyangOre 2s infinite ease-in-out;
}

.card:hover{
transform:scale(1.05);
}

.selected{
border:3px solid #00ff88;
transform:scale(1.1);
}

.payments{
margin-top:25px;
}

.pay-btn{
background:#333;
border:none;
color:white;
padding:10px 16px;
margin:5px;
border-radius:8px;
cursor:pointer;
}

.pay-selected{
background:#00ff88;
color:black;
font-weight:bold;
}

.order-btn{
margin-top:20px;
background:#25D366;
border:none;
padding:14px 26px;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

/* 🔥 KEYFRAMES ANIMASI */
@keyframes goyangOre {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(6deg); }
  50% { transform: rotate(0deg); }
  75% { transform: rotate(-6deg); }
  100% { transform: rotate(0deg); }
}

/* 🔥 DELAY BIAR GAK BARENG */
.card:nth-child(1) img { animation-delay: 0s; }
.card:nth-child(2) img { animation-delay: 0.2s; }
.card:nth-child(3) img { animation-delay: 0.4s; }
.card:nth-child(4) img { animation-delay: 0.6s; }
.card:nth-child(5) img { animation-delay: 0.8s; }
.card:nth-child(6) img { animation-delay: 1s; }
.card:nth-child(7) img { animation-delay: 1.2s; }
.card:nth-child(8) img { animation-delay: 1.4s; }
.card:nth-child(9) img { animation-delay: 1.6s; }

</style>

</head>

<body>

<div class="overlay">

<h1>⛏️ Jasa Cari Barang Minecraft</h1>
<p>Order mining sesuai kebutuhan kamu</p>

<div class="grid">

<div class="card" onclick="selectItem(this,'Diamond')">
<h3><img src="diamond.png">Diamond</h3>
</div>

<div class="card" onclick="selectItem(this,'Coal')">
<h3><img src="coal.png">Coal</h3>
</div>

<div class="card" onclick="selectItem(this,'Netherite')">
<h3><img src="netherite.png">Netherite</h3>
</div>

<div class="card" onclick="selectItem(this,'Copper')">
<h3><img src="copper.png">Copper</h3>
</div>

<div class="card" onclick="selectItem(this,'Gold')">
<h3><img src="gold.png">Gold</h3>
</div>

<div class="card" onclick="selectItem(this,'Iron')">
<h3><img src="iron.png">Iron</h3>
</div>

<div class="card" onclick="selectItem(this,'Redstone')">
<h3><img src="redstone.png">Redstone</h3>
</div>

<div class="card" onclick="selectItem(this,'Lapis Lazuli')">
<h3><img src="lapis.png">Lapis Lazuli</h3>
</div>

<div class="card" onclick="selectItem(this,'Kayu')">
<h3><img src="wood.png">Kayu</h3>
</div>

</div>

<div class="payments">

<h3>Pilih Metode Pembayaran</h3>

<button class="pay-btn" onclick="selectPay(this,'DANA')">DANA</button>
<button class="pay-btn" onclick="selectPay(this,'OVO')">OVO</button>
<button class="pay-btn" onclick="selectPay(this,'GoPay')">GoPay</button>
<button class="pay-btn" onclick="selectPay(this,'QRIS')">QRIS</button>

</div>

<button class="order-btn" onclick="sendOrder()">Order via WhatsApp</button>

</div>

<script>

let item=""
let pay=""

function selectItem(card,name){

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("selected")
})

card.classList.add("selected")

item=name

}

function selectPay(btn,name){

document.querySelectorAll(".pay-btn").forEach(b=>{
b.classList.remove("pay-selected")
})

btn.classList.add("pay-selected")

pay=name

}

function sendOrder(){

if(item=="" || pay==""){
alert("Pilih item dan metode pembayaran dulu!")
return
}

let text="Min saya mau beli "+item+" dan saya bayar pakai "+pay

let url="https://wa.me/628984830064?text="+encodeURIComponent(text)

window.open(url)

}

</script>

</body>

</html>
