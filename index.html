<!DOCTYPE html>
<html>
<head>
<title>Jasa Cari Barang Minecraft - Ojan</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    color:white;
    text-align:center;

    /* Background Creeper */
    background-image:url("https://wallpapercave.com/wp/wp2757874.jpg");
    background-size:cover;
    background-position:center;
}

.overlay{
    background:rgba(0,0,0,0.75);
    min-height:100vh;
    padding:40px;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

.subtitle{
    margin-bottom:40px;
    font-size:18px;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:#1e1e1e;
    padding:20px;
    width:220px;
    border-radius:12px;
    box-shadow:0 0 10px black;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.price{
    color:#00ff88;
    font-weight:bold;
}

.order{
    margin-top:40px;
}

.order-btn{
    background:#25D366;
    border:none;
    padding:15px 35px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

.order-btn:hover{
    background:#1ebe5d;
}

</style>
</head>

<body>

<div class="overlay">

<h1>⛏️ Jasa Cari Barang Minecraft</h1>
<p class="subtitle">Malas mining? Biar Ojan yang cariin!</p>

<div class="container">

<div class="card">
<h2>🌳 Kayu</h2>
<p>Semua jenis kayu</p>
<p class="price">1 Stack = Rp2.000</p>
</div>

<div class="card">
<h2>🪨 Ore Biasa</h2>
<p>Coal / Iron / Copper</p>
<p class="price">Mulai Rp2.000</p>
</div>

<div class="card">
<h2>💎 Ore Langka</h2>
<p>Diamond / Gold</p>
<p class="price">Harga sesuai jumlah</p>
</div>

<div class="card">
<h2>🔥 Nether</h2>
<p>Ancient Debris</p>
<p class="price">Request harga</p>
</div>

</div>

<div class="order">
<h2>Order Sekarang</h2>

<a href="https://wa.me/628984830064">
<button class="order-btn">Chat WhatsApp</button>
</a>

</div>

</div>

</body>
  </html>
